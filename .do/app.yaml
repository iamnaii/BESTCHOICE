name: bestchoice-installment

# ============================================
# API Service (NestJS)
# ============================================
services:
  - name: api
    dockerfile_path: Dockerfile
    http_port: 3000
    instance_count: 1
    instance_size_slug: basic-xxs
    health_check:
      http_path: /api/health
      initial_delay_seconds: 30
      period_seconds: 30
    routes:
      - path: /api
        preserve_path_prefix: true
    envs:
      - key: DATABASE_URL
        scope: RUN_TIME
        value: ${db.DATABASE_URL}
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3000"
      - key: JWT_SECRET
        type: SECRET
        value: CHANGE_ME_USE_RANDOM_64_CHARS
      - key: JWT_REFRESH_SECRET
        type: SECRET
        value: CHANGE_ME_USE_RANDOM_64_CHARS
      - key: JWT_EXPIRATION
        value: 15m
      - key: JWT_REFRESH_EXPIRATION
        value: 7d
      - key: ENCRYPTION_KEY
        type: SECRET
        value: CHANGE_ME_USE_RANDOM_32_CHARS
      - key: FRONTEND_URL
        value: ${APP_URL}

# ============================================
# Web Frontend (Static Site)
# ============================================
static_sites:
  - name: web
    dockerfile_path: Dockerfile.web
    routes:
      - path: /
    catchall_document: index.html

# ============================================
# Managed Database
# ============================================
databases:
  - name: db
    engine: PG
    version: "16"
    size: db-s-dev-database
    num_nodes: 1
