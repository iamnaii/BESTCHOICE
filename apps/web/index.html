<!DOCTYPE html>
<html lang="th">
  <head>
    <meta name="robots" content="noindex, nofollow, noarchive, nosnippet, noimageindex" />
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/logo-icon.svg" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#4f46e5" />
    <meta name="description" content="ระบบบริหารจัดการสัญญาผ่อนชำระ BESTCHOICE" />
    <link rel="apple-touch-icon" href="/logo-icon.svg" />
    <title>ระบบผ่อนชำระ - Best Choice</title>
    <!-- Preload Thai fonts to ensure Bold variant is available immediately -->
    <link rel="preload" href="/fonts/THSarabunPSK-Regular.ttf" as="font" type="font/ttf" crossorigin />
    <link rel="preload" href="/fonts/THSarabunPSK-Bold.ttf" as="font" type="font/ttf" crossorigin />
  </head>
  <body>
    <div id="root">
      <div style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:#f9fafb">
        <div style="text-align:center">
          <div style="width:40px;height:40px;border:3px solid #e5e7eb;border-top-color:#4f46e5;border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto"></div>
          <p style="margin-top:12px;color:#6b7280;font-size:14px;font-family:sans-serif">กำลังโหลด...</p>
        </div>
      </div>
      <style>@keyframes spin{to{transform:rotate(360deg)}}</style>
    </div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').catch(() => {});
        });
      }
    </script>
  </body>
</html>
