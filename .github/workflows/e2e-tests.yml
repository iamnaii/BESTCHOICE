name: E2E Tests

on:
  pull_request:
    branches: [main]
    paths:
      - 'apps/web/**'
      - 'apps/api/**'
      - '.github/workflows/e2e-tests.yml'
  workflow_dispatch:

env:
  NODE_VERSION: '20'

jobs:
  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    strategy:
      fail-fast: false
      matrix:
        # Shard E2E tests across 4 parallel runners for speed
        shard: [1, 2, 3, 4]

    env:
      DATABASE_URL: postgresql://test:test@localhost:5432/test_db?schema=public
      JWT_SECRET: test-secret
      JWT_REFRESH_SECRET: test-refresh-secret
      JWT_EXPIRATION: 15m
      JWT_REFRESH_EXPIRATION: 7d
      ENCRYPTION_KEY: test-encryption-key-for-ci
      PORT: 3000
      NODE_ENV: test
      BASE_URL: http://localhost:5173
      CI: true

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate --schema=apps/api/prisma/schema.prisma

      - name: Run DB migrations
        run: npx prisma migrate deploy --schema=apps/api/prisma/schema.prisma

      - name: Build API
        run: npm run build --workspace=apps/api

      - name: Seed test database
        run: node apps/api/dist/prisma/seed.js

      - name: Build Web
        run: npm run build --workspace=apps/web
        env:
          VITE_API_URL: http://localhost:3000/api

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium
        working-directory: apps/web

      - name: Start API server
        run: node apps/api/dist/src/main.js &

      - name: Wait for API
        run: npx wait-on http://localhost:3000/api/health --timeout 30000

      - name: Serve Web build
        run: npx serve -s apps/web/dist -l 5173 &

      - name: Wait for Web
        run: npx wait-on http://localhost:5173 --timeout 15000

      - name: Run E2E tests (shard ${{ matrix.shard }}/4)
        run: npx playwright test --project=chromium --shard=${{ matrix.shard }}/4
        working-directory: apps/web

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-shard-${{ matrix.shard }}
          path: apps/web/playwright-report/
          retention-days: 7

      - name: Upload test screenshots
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: test-screenshots-shard-${{ matrix.shard }}
          path: apps/web/test-results/
          retention-days: 3

  # Merge shard reports into a single report
  merge-reports:
    name: Merge E2E Reports
    needs: e2e
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Download shard reports
        uses: actions/download-artifact@v4
        with:
          pattern: playwright-report-shard-*
          path: all-reports/

      - name: Merge reports
        run: npx playwright merge-reports --reporter=html all-reports/
        working-directory: apps/web
        continue-on-error: true

      - name: Upload merged report
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-full
          path: apps/web/playwright-report/
          retention-days: 14
