version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: installment-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: installment_db
    ports:
      - '127.0.0.1:5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  postgres-finance:
    image: postgres:16-alpine
    container_name: installment-postgres-finance
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: installment_finance_db
    ports:
      - '127.0.0.1:5433:5432'
    volumes:
      - postgres_finance_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: installment-redis
    ports:
      - '127.0.0.1:6379:6379'
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  postgres_finance_data:
  redis_data:
