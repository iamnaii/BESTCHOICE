name: Build Card Reader

on:
  push:
    branches: [main]
    paths:
      - 'apps/card-reader/**'
    tags:
      - 'card-reader-v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. 1.0.0)'
        required: false
        default: 'dev'

permissions:
  contents: write

env:
  NODE_VERSION: '20'

jobs:
  build-windows:
    name: Build Windows Installer
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Determine version
        id: version
        shell: bash
        run: |
          if [[ "${{ github.ref }}" == refs/tags/card-reader-v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/card-reader-v}"
          elif [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="$(date +%Y%m%d)-${GITHUB_SHA::7}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        run: npm install

      - name: Verify pcsclite native module
        shell: pwsh
        run: |
          # Search both workspace root and local node_modules
          $searchPaths = @("apps/card-reader/node_modules/pcsclite", "node_modules/pcsclite")
          $found = $false
          foreach ($p in $searchPaths) {
            if (Test-Path $p) {
              Write-Host "Found pcsclite at: $p"
              $nodeFile = Get-ChildItem -Recurse -Filter "*.node" -Path $p -ErrorAction SilentlyContinue
              if ($nodeFile) {
                Write-Host "OK: Native binary: $($nodeFile.FullName)"
                $found = $true
                break
              } else {
                Write-Host "WARNING: pcsclite dir exists at $p but no .node binary"
              }
            }
          }
          if (-not $found) {
            Write-Error "FATAL: pcsclite native module not found or not compiled!"
            # Debug: show what's actually in node_modules
            Write-Host "--- Root node_modules top-level ---"
            Get-ChildItem node_modules -Name -ErrorAction SilentlyContinue | Select-Object -First 30
            Write-Host "--- apps/card-reader/node_modules top-level ---"
            Get-ChildItem apps/card-reader/node_modules -Name -ErrorAction SilentlyContinue | Select-Object -First 30
            exit 1
          }

      - name: Bundle with esbuild
        working-directory: apps/card-reader
        run: npm run build

      - name: Download portable Node.js
        shell: pwsh
        run: |
          $nodeUrl = "https://nodejs.org/dist/v20.18.1/node-v20.18.1-win-x64.zip"
          Invoke-WebRequest -Uri $nodeUrl -OutFile node-portable.zip
          Expand-Archive -Path node-portable.zip -DestinationPath node-extracted
          # Keep only node.exe to minimize size
          New-Item -ItemType Directory -Force -Path apps/card-reader/bundle/node
          Copy-Item node-extracted/node-v20.18.1-win-x64/node.exe apps/card-reader/bundle/node/node.exe

      - name: Assemble distribution
        shell: pwsh
        run: |
          $dist = "BestchoiceCardReader"
          New-Item -ItemType Directory -Force -Path $dist

          # Copy portable Node.js
          Copy-Item -Recurse apps/card-reader/bundle/node $dist/node

          # Copy bundled app
          New-Item -ItemType Directory -Force -Path $dist/app/dist
          Copy-Item apps/card-reader/dist/index.js $dist/app/dist/index.js

          # Copy pcsclite and its required dependencies
          New-Item -ItemType Directory -Force -Path $dist/app/node_modules
          $requiredModules = @("pcsclite", "bindings", "file-uri-to-path", "nan")
          $searchPaths = @("apps/card-reader/node_modules", "node_modules")
          foreach ($mod in $requiredModules) {
            $copied = $false
            foreach ($base in $searchPaths) {
              $src = "$base/$mod"
              if (Test-Path $src) {
                Copy-Item -Recurse $src "$dist/app/node_modules/$mod"
                Write-Host "Copied $mod from $src"
                $copied = $true
                break
              }
            }
            if (-not $copied) {
              Write-Error "FATAL: $mod not found in any node_modules!"
              exit 1
            }
          }

          # Copy scripts
          Copy-Item apps/card-reader/scripts/BestchoiceCardReader.bat $dist/
          Copy-Item apps/card-reader/scripts/setup.bat $dist/
          Copy-Item apps/card-reader/scripts/uninstall.bat $dist/
          Copy-Item apps/card-reader/INSTALL.txt $dist/README.txt

      - name: Create ZIP
        shell: pwsh
        run: |
          Compress-Archive -Path BestchoiceCardReader -DestinationPath "BestchoiceCardReader-v${{ steps.version.outputs.version }}-win-x64.zip"
          Copy-Item "BestchoiceCardReader-v${{ steps.version.outputs.version }}-win-x64.zip" "BestchoiceCardReader.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: BestchoiceCardReader-win-x64
          path: BestchoiceCardReader-v*.zip

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: card-reader-latest
          name: "BESTCHOICE Card Reader"
          prerelease: false
          make_latest: true
          body: |
            ## BESTCHOICE Card Reader

            ### วิธีติดตั้ง
            1. โหลดไฟล์ `.zip` ด้านล่าง
            2. แตกไฟล์ (คลิกขวา → Extract All)
            3. เปิดโฟลเดอร์ที่แตกไฟล์ → ดับเบิลคลิก `setup.bat`
            4. เสร็จ! ใช้ได้เลย

            ### ต้องมี
            - Windows 10 ขึ้นไป
            - เครื่องอ่านบัตร USB Smart Card Reader

            Build: v${{ steps.version.outputs.version }}
          files: |
            BestchoiceCardReader-v*.zip
            BestchoiceCardReader.zip
