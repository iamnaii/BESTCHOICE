name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '20'

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Security audit
        run: npm audit --audit-level=high
        continue-on-error: true

      - name: Generate Prisma Client
        run: npx prisma generate --schema=apps/api/prisma/schema.prisma

      - name: Run DB migrations
        run: npx prisma migrate deploy --schema=apps/api/prisma/schema.prisma
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/test_db?schema=public

      - name: Lint API
        run: npm run lint --workspace=apps/api

      - name: Lint Web
        run: npm run lint --workspace=apps/web

      - name: Test API
        run: npm run test --workspace=apps/api
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/test_db?schema=public
          JWT_SECRET: test-secret

      - name: Build API
        run: npm run build --workspace=apps/api

      - name: Build Web
        run: npm run build --workspace=apps/web

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium
        working-directory: apps/web

      - name: Seed test database
        run: npx prisma db seed --schema=apps/api/prisma/schema.prisma
        continue-on-error: true
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/test_db?schema=public

      - name: Start API server
        run: node apps/api/dist/main.js &
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/test_db?schema=public
          JWT_SECRET: test-secret
          JWT_REFRESH_SECRET: test-refresh-secret
          JWT_EXPIRATION: 15m
          JWT_REFRESH_EXPIRATION: 7d
          PORT: 3000
          NODE_ENV: test

      - name: Wait for API
        run: npx wait-on http://localhost:3000/api/health --timeout 30000

      - name: Serve Web build
        run: npx serve -s apps/web/dist -l 5173 &

      - name: Wait for Web
        run: npx wait-on http://localhost:5173 --timeout 15000

      - name: Run E2E tests
        run: npx playwright test --project=chromium
        working-directory: apps/web
        env:
          BASE_URL: http://localhost:5173
          CI: true

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: apps/web/playwright-report/
          retention-days: 7

  build-and-push:
    name: Build & Push Docker Image
    needs: lint-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.DOCKER_REGISTRY }}
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_REGISTRY }}/installment-system:latest
            ${{ secrets.DOCKER_REGISTRY }}/installment-system:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Production
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            cd /opt/installment-system
            docker compose -f docker-compose.prod.yml pull
            # Run migrations BEFORE restarting the app to prevent schema mismatch
            docker compose -f docker-compose.prod.yml up -d db
            docker compose -f docker-compose.prod.yml run --rm api npx prisma migrate deploy
            docker compose -f docker-compose.prod.yml up -d --remove-orphans
            docker system prune -f
