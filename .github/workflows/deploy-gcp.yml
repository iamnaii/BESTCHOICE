name: Deploy to GCP (Cloud Run + Firebase)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '20'
  GAR_LOCATION: asia-southeast1
  API_IMAGE: asia-southeast1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/bestchoice/api

jobs:
  # ============================================
  # Job 1: Lint, Test, Build (same as deploy.yml)
  # ============================================
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Security audit
        run: npm audit --audit-level=high
        continue-on-error: true

      - name: Generate Prisma Client
        run: npx prisma generate --schema=apps/api/prisma/schema.prisma

      - name: Run DB migrations
        run: npx prisma migrate deploy --schema=apps/api/prisma/schema.prisma
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/test_db?schema=public

      - name: Lint API
        run: npm run lint --workspace=apps/api

      - name: Lint Web
        run: npm run lint --workspace=apps/web

      - name: Test API
        run: npm run test --workspace=apps/api
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/test_db?schema=public
          JWT_SECRET: test-secret

      - name: Build API
        run: npm run build --workspace=apps/api

      - name: Build Web
        run: npm run build --workspace=apps/web
        env:
          VITE_API_URL: http://localhost:3000/api

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium
        working-directory: apps/web

      - name: Seed test database
        run: node apps/api/dist/prisma/seed.js
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/test_db?schema=public
          ENCRYPTION_KEY: test-encryption-key-for-ci

      - name: Start API server
        run: node apps/api/dist/src/main.js &
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/test_db?schema=public
          JWT_SECRET: test-secret
          JWT_REFRESH_SECRET: test-refresh-secret
          JWT_EXPIRATION: 15m
          JWT_REFRESH_EXPIRATION: 7d
          ENCRYPTION_KEY: test-encryption-key-for-ci
          PORT: 3000
          NODE_ENV: test

      - name: Wait for API
        run: npx wait-on http://localhost:3000/api/health --timeout 30000

      - name: Serve Web build
        run: npx serve -s apps/web/dist -l 5173 &

      - name: Wait for Web
        run: npx wait-on http://localhost:5173 --timeout 15000

      - name: Run E2E tests
        run: npx playwright test --project=chromium
        working-directory: apps/web
        env:
          BASE_URL: http://localhost:5173
          CI: true

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: apps/web/playwright-report/
          retention-days: 7

  # ============================================
  # Job 2: Build API Docker Image → Artifact Registry
  # ============================================
  build-and-push-api:
    name: Build & Push API Image
    needs: lint-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup gcloud CLI
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.GAR_LOCATION }}-docker.pkg.dev --quiet

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.API_IMAGE }}:latest
            ${{ env.API_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Output image tag
        id: meta
        run: echo "tags=${{ env.API_IMAGE }}:${{ github.sha }}" >> "$GITHUB_OUTPUT"

  # ============================================
  # Job 3: Run Prisma Migrations via Cloud Run Job
  # ============================================
  migrate-db:
    name: Run Database Migrations
    needs: build-and-push-api
    runs-on: ubuntu-latest

    steps:
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup gcloud CLI
        uses: google-github-actions/setup-gcloud@v2

      - name: Create or update migration job
        run: |
          gcloud run jobs update bestchoice-migrate \
            --project=${{ secrets.GCP_PROJECT_ID }} \
            --region=${{ secrets.GCP_REGION || 'asia-southeast1' }} \
            --image=${{ env.API_IMAGE }}:${{ github.sha }} \
            --set-secrets=DATABASE_URL=DATABASE_URL:latest \
            --set-cloudsql-instances=${{ secrets.CLOUD_SQL_CONNECTION_NAME }} \
            --command="npx" \
            --args="prisma,migrate,deploy,--schema=./apps/api/prisma/schema.prisma" \
            --max-retries=3 \
            --task-timeout=300s \
            2>/dev/null || \
          gcloud run jobs create bestchoice-migrate \
            --project=${{ secrets.GCP_PROJECT_ID }} \
            --region=${{ secrets.GCP_REGION || 'asia-southeast1' }} \
            --image=${{ env.API_IMAGE }}:${{ github.sha }} \
            --set-secrets=DATABASE_URL=DATABASE_URL:latest \
            --set-cloudsql-instances=${{ secrets.CLOUD_SQL_CONNECTION_NAME }} \
            --command="npx" \
            --args="prisma,migrate,deploy,--schema=./apps/api/prisma/schema.prisma" \
            --max-retries=3 \
            --task-timeout=300s

      - name: Execute migration
        run: |
          gcloud run jobs execute bestchoice-migrate \
            --project=${{ secrets.GCP_PROJECT_ID }} \
            --region=${{ secrets.GCP_REGION || 'asia-southeast1' }} \
            --wait

  # ============================================
  # Job 4: Deploy API to Cloud Run
  # ============================================
  deploy-api:
    name: Deploy API to Cloud Run
    needs: migrate-db
    runs-on: ubuntu-latest

    steps:
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup gcloud CLI
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy bestchoice-api \
            --project=${{ secrets.GCP_PROJECT_ID }} \
            --region=${{ secrets.GCP_REGION || 'asia-southeast1' }} \
            --image=${{ env.API_IMAGE }}:${{ github.sha }} \
            --platform=managed \
            --port=3000 \
            --min-instances=1 \
            --max-instances=10 \
            --memory=1Gi \
            --cpu=1 \
            --set-secrets="\
          JWT_SECRET=JWT_SECRET:latest,\
          JWT_REFRESH_SECRET=JWT_REFRESH_SECRET:latest,\
          ENCRYPTION_KEY=ENCRYPTION_KEY:latest,\
          DATABASE_URL=DATABASE_URL:latest,\
          ANTHROPIC_API_KEY=ANTHROPIC_API_KEY:latest,\
          S3_ACCESS_KEY=S3_ACCESS_KEY:latest,\
          S3_SECRET_KEY=S3_SECRET_KEY:latest,\
          LINE_CHANNEL_ACCESS_TOKEN=LINE_CHANNEL_ACCESS_TOKEN:latest,\
          LINE_CHANNEL_SECRET=LINE_CHANNEL_SECRET:latest,\
          SMS_API_KEY=SMS_API_KEY:latest,\
          SMS_API_SECRET=SMS_API_SECRET:latest,\
          SMTP_PASS=SMTP_PASS:latest,\
          PAYSOLUTIONS_SECRET_KEY=PAYSOLUTIONS_SECRET_KEY:latest,\
          PAYSOLUTIONS_WEBHOOK_SECRET=PAYSOLUTIONS_WEBHOOK_SECRET:latest" \
            --set-env-vars="\
          NODE_ENV=production,\
          SKIP_MIGRATION=true,\
          FRONTEND_URL=${{ secrets.FRONTEND_URL || 'https://bestchoice-prod.web.app' }},\
          COOKIE_CROSS_DOMAIN=true,\
          JWT_EXPIRATION=15m,\
          JWT_REFRESH_EXPIRATION=7d,\
          DATABASE_CONNECTION_LIMIT=10,\
          DATABASE_POOL_TIMEOUT=15" \
            --set-cloudsql-instances=${{ secrets.CLOUD_SQL_CONNECTION_NAME }} \
            --allow-unauthenticated

      - name: Verify deployment
        run: |
          API_URL=$(gcloud run services describe bestchoice-api \
            --project=${{ secrets.GCP_PROJECT_ID }} \
            --region=${{ secrets.GCP_REGION || 'asia-southeast1' }} \
            --format='value(status.url)')
          echo "API deployed to: ${API_URL}"
          curl -sf "${API_URL}/api/health" || (echo "Health check failed" && exit 1)

  # ============================================
  # Job 5: Deploy Frontend to Firebase Hosting
  # ============================================
  deploy-web:
    name: Deploy Web to Firebase Hosting
    needs: lint-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build --workspace=apps/web
        env:
          VITE_API_URL: ${{ secrets.API_URL || 'https://bestchoice-api-run.app' }}/api

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          channelId: live
          projectId: ${{ secrets.GCP_PROJECT_ID }}
