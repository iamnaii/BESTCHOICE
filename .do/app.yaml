name: bestchoice-installment
region: sgp

# ============================================
# API Service (NestJS + Prisma)
# ============================================
services:
  - name: api
    github:
      repo: iamnaii/BESTCHOICE
      branch: main
      deploy_on_push: true
    dockerfile_path: Dockerfile
    http_port: 3000
    instance_count: 1
    instance_size_slug: basic-xs
    health_check:
      http_path: /api/health
      initial_delay_seconds: 60
      period_seconds: 30
      timeout_seconds: 10
      failure_threshold: 5
    routes:
      - path: /api
        preserve_path_prefix: true
    envs:
      - key: DATABASE_URL
        scope: RUN_TIME
        value: ${db.DATABASE_URL}?connection_limit=3&pool_timeout=30
      - key: NODE_ENV
        scope: RUN_AND_BUILD_TIME
        value: production
      - key: PORT
        scope: RUN_TIME
        value: "3000"
      - key: JWT_SECRET
        scope: RUN_TIME
        type: SECRET
        value: 30ef909c11ae6569824c50851ce129fedf81072aed43858a11c79643e70f1801
      - key: JWT_REFRESH_SECRET
        scope: RUN_TIME
        type: SECRET
        value: a409b6e706724f657520a9c9d4e21a0523624e4561739c0426bebed402c7df68
      - key: JWT_EXPIRATION
        scope: RUN_TIME
        value: "15m"
      - key: JWT_REFRESH_EXPIRATION
        scope: RUN_TIME
        value: "7d"
      - key: ENCRYPTION_KEY
        scope: RUN_TIME
        type: SECRET
        value: 570def0a8f1b9fa778eabb55d107a07f
      - key: FRONTEND_URL
        scope: RUN_TIME
        value: ${APP_URL}
      # LINE OA (ตั้งค่าผ่านหน้า Settings ก็ได้ หรือใส่ตรงนี้)
      - key: LINE_CHANNEL_ACCESS_TOKEN
        scope: RUN_TIME
        type: SECRET
        value: ""
      - key: LINE_CHANNEL_SECRET
        scope: RUN_TIME
        type: SECRET
        value: ""
      - key: LIFF_ID
        scope: RUN_TIME
        value: ""
      - key: PROMPTPAY_ID
        scope: RUN_TIME
        value: ""
      - key: PROMPTPAY_ACCOUNT_NAME
        scope: RUN_TIME
        value: ""
      - key: PAYMENT_LINK_BASE_URL
        scope: RUN_TIME
        value: ""

# ============================================
# Web Frontend (Static Site)
# ============================================
static_sites:
  - name: web
    github:
      repo: iamnaii/BESTCHOICE
      branch: main
      deploy_on_push: true
    source_dir: apps/web
    build_command: npm install && npx vite build
    output_dir: dist
    catchall_document: index.html
    routes:
      - path: /
    envs:
      - key: VITE_API_URL
        scope: BUILD_TIME
        value: ${API_URL}
      - key: VITE_LIFF_ID
        scope: BUILD_TIME
        value: ""

# ============================================
# Managed Database (PostgreSQL 16)
# ============================================
databases:
  - name: db
    engine: PG
    version: "16"
    size: db-s-dev-database
    num_nodes: 1
